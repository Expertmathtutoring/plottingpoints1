<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cartesian Plane Plotting Game (Linear Relationships)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #eef6fa; max-width: 850px; margin: 24px auto; }
    h1, h2 { color: #2980b9; text-align: center; }
    .section { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #b1c7db4d; padding: 24px; }
    .game-flex { display: flex; flex-wrap: wrap; gap: 24px; }
    .left-pane { flex: 1 1 350px; }
    .right-pane { flex: 2 1 460px; min-width: 330px; }
    .input-row { margin: 18px 0; }
    button { background: #2980b9; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #21618c; }
    .feedback { margin: 12px 0; font-weight: bold; min-height: 25px; }
    .correct { color: green; }
    .incorrect { color: red; }
    label { font-weight: bold;}
    #plot-area { width: 100%; height: 400px; touch-action: none; }
    @media (max-width: 720px){
      .game-flex { flex-direction: column; }
      .left-pane, .right-pane { min-width: 100%; }
      #plot-area { height: 320px;}
    }
  </style>
</head>
<body>
<h1>Cartesian Plane Plotting Game</h1>
<div class="section">
  <div class="game-flex">
    <div class="left-pane">
      <h2>Linear Relationships</h2>
      <div>
        <label>Select activity:</label><br>
        <input type="radio" name="activity" id="plot-given" value="plot" checked>
        <label for="plot-given">Plot the point (given ordered pair)</label><br>
        <input type="radio" name="activity" id="write-coords" value="write">
        <label for="write-coords">Write down coordinates (given point)</label>
      </div>
      <hr>
      <div id="game-question" style="font-size:1.15em; margin:16px 0;"></div>
      <div class="input-row" id="input-area"></div>
      <div class="feedback" id="feedback"></div>
      <button id="next-btn">Next</button>
    </div>
    <div class="right-pane">
      <h2>Cartesian Plane</h2>
      <div id="plot-area" aria-label="Interactive Cartesian plane"></div>
    </div>
  </div>
</div>

<script>
let mode = "plot";
let question = {};
let userMarker = null;
const axesConfig = { x: {min: -10, max: 10}, y: {min: -10, max: 10} };

function getRandomInt(min,max,excludeZero=true){
  let r;
  do { r = Math.floor(Math.random()*(max-min+1))+min;}
  while (excludeZero && r===0);
  return r;
}

function newQuestion() {
  document.getElementById('feedback').textContent = '';
  userMarker = null;
  mode = document.querySelector('input[name="activity"]:checked').value;
  
  let x = getRandomInt(axesConfig.x.min+2, axesConfig.x.max-2);
  let y = getRandomInt(axesConfig.y.min+2, axesConfig.y.max-2);

  if (mode === 'plot') {
    question = {x, y};
    document.getElementById('game-question').innerHTML = `Drag or click the blue circle to <b>(${x}, ${y})</b> on the Cartesian plane.`;
    document.getElementById('input-area').innerHTML = '<p>Drag and drop the marker or click anywhere on the plane.</p>';
    drawPlotDraggable({x: 0, y: 0});
    setPlotClickHandler();
  } else if (mode === 'write') {
    question = {x, y};
    drawPlot({x,y}, false);
    document.getElementById('game-question').innerHTML = `What are the coordinates of the highlighted point <span style="color:#b7950b;">•</span>? Write as an ordered pair:`;
    document.getElementById('input-area').innerHTML =
      `<input type="text" id="coords-input" placeholder="e.g. (2, 5)" style="width:120px; font-size:1.1em;" />`;
    removePlotClickHandler();
  }
}

// Draw axes and draggable marker for plot mode
function drawPlotDraggable(marker) {
  const data = [
    {
      x: [marker.x],
      y: [marker.y],
      mode: 'markers',
      marker: { size: 24, color: '#2980b9', symbol: 'circle' },
      name: 'Draggable',
      text: ['Drag me!'],
      hoverinfo: 'text'
    }
  ];

  const layout = {
    xaxis: {
      range: [axesConfig.x.min, axesConfig.x.max],
      dtick: 1,
      zeroline: true,
      zerolinewidth: 2,
      gridcolor: 'rgba(128,128,128,0.15)',
      gridwidth: 1,
      showline: true,
      linewidth: 2,
      fixedrange: true
    },
    yaxis: {
      range: [axesConfig.y.min, axesConfig.y.max],
      dtick: 1,
      zeroline: true,
      zerolinewidth: 2,
      gridcolor: 'rgba(128,128,128,0.15)',
      gridwidth: 1,
      showline: true,
      linewidth: 2,
      scaleanchor: 'x',
      scaleratio: 1,
      fixedrange: true
    },
    showlegend: false,
    margin: { t: 40, r: 40, b: 40, l: 40 },
    plot_bgcolor: '#f6fafd',
    hovermode: false,
    dragmode: false
  };

  Plotly.newPlot('plot-area', data, layout, { displayModeBar: false, responsive: true });
}

// Set combination of dragging and clicking handlers on plot for "plot" mode
function setPlotClickHandler() {
  removePlotClickHandler();

  const plotDiv = document.getElementById('plot-area');
  let dragging = false;

  function pixelToAxis(xPixel, yPixel) {
    const gd = plotDiv._fullLayout;
    if (!gd) return null;
    let xVal = gd.xaxis.p2c.inverse(xPixel);
    let yVal = gd.yaxis.p2c.inverse(yPixel);
    // keep in axis range
    xVal = Math.min(Math.max(xVal, axesConfig.x.min), axesConfig.x.max);
    yVal = Math.min(Math.max(yVal, axesConfig.y.min), axesConfig.y.max);
    return { x: Math.round(xVal), y: Math.round(yVal) };
  }

  function updateMarker(pos) {
    userMarker = pos;
    Plotly.update(plotDiv, { x: [[pos.x]], y: [[pos.y]], marker: { color: '#2980b9' } }, {}, [0]);
    document.getElementById('input-area').innerHTML = `<p>Your marker position: <b>(${pos.x}, ${pos.y})</b></p>`;
  }

  function checkAfterMove() {
    if (!userMarker) {
      document.getElementById('feedback').innerHTML = `<span class="incorrect">Drag or click the marker to the coordinate.</span>`;
      return;
    }
    if (userMarker.x === question.x && userMarker.y === question.y) {
      document.getElementById('feedback').innerHTML = `<span class="correct">🎉 Correct! (${question.x}, ${question.y}) is plotted.</span>`;
      Plotly.update(plotDiv, { marker: { color: '#27ae60' } }, {}, [0]); // green
    } else {
      document.getElementById('feedback').innerHTML = `<span class="incorrect">❌ Try again. You selected (${userMarker.x}, ${userMarker.y}), but need (${question.x}, ${question.y}).</span>`;
      Plotly.update(plotDiv, { marker: { color: '#e74c3c' } }, {}, [0]); // red
    }
  }

  function onClick(evt) {
    if (dragging) return;
    const rect = plotDiv.getBoundingClientRect();
    let clientX, clientY;
    if (evt.type.startsWith('touch')) {
      clientX = evt.touches[0].clientX;
      clientY = evt.touches[0].clientY;
    } else {
      clientX = evt.clientX;
      clientY = evt.clientY;
    }
    const xPixel = clientX - rect.left;
    const yPixel = clientY - rect.top;
    const pos = pixelToAxis(xPixel, yPixel);
    if (!pos) return;
    updateMarker(pos);
    checkAfterMove();
  }

  function onDragStart(evt) {
    const rect = plotDiv.getBoundingClientRect();
    const gd = plotDiv._fullLayout;
    const markerData = plotDiv.data[0];
    if (!markerData || markerData.x.length === 0) return;
    const markerXPixel = gd.xaxis.p2c(markerData.x[0]);
    const markerYPixel = gd.yaxis.p2c(markerData.y[0]);

    let clientX, clientY;
    if (evt.type.startsWith('touch')) {
      clientX = evt.touches[0].clientX;
      clientY = evt.touches[0].clientY;
    } else {
      clientX = evt.clientX;
      clientY = evt.clientY;
    }

    const clickX = clientX - rect.left;
    const clickY = clientY - rect.top;
    const dist = Math.hypot(clickX - markerXPixel, clickY - markerYPixel);

    if (dist > 15) return;

    dragging = true;
    evt.preventDefault();
  }

  function onDragMove(evt) {
    if (!dragging) return;
    const rect = plotDiv.getBoundingClientRect();
    let clientX, clientY;
    if (evt.type.startsWith('touch')) {
      clientX = evt.touches[0].clientX;
      clientY = evt.touches[0].clientY;
      evt.preventDefault();
    } else {
      clientX = evt.clientX;
      clientY = evt.clientY;
    }
    const xPixel = clientX - rect.left;
    const yPixel = clientY - rect.top;

    const pos = pixelToAxis(xPixel, yPixel);
    if (!pos) return;

    Plotly.update(plotDiv, { x: [[pos.x]], y: [[pos.y]], marker: { color: '#2980b9' } }, {}, [0]);
    document.getElementById('input-area').innerHTML = `<p>Dragging marker at: <b>(${pos.x}, ${pos.y})</b></p>`;
  }

  function onDragEnd(evt) {
    if (!dragging) return;
    dragging = false;
    const plotDiv = document.getElementById('plot-area');
    const gd = plotDiv._fullLayout;
    if (!gd) return;
    const markerData = plotDiv.data[0];
    if (!markerData || markerData.x.length === 0) return;
    let xVal = Math.round(markerData.x[0]);
    let yVal = Math.round(markerData.y[0]);
    xVal = Math.min(Math.max(xVal, axesConfig.x.min), axesConfig.x.max);
    yVal = Math.min(Math.max(yVal, axesConfig.y.min), axesConfig.y.max);
    userMarker = { x: xVal, y: yVal };
    Plotly.update(plotDiv, { x: [[xVal]], y: [[yVal]], marker: { color: '#2980b9' } }, {}, [0]);
    document.getElementById('input-area').innerHTML = `<p>Your marker position: <b>(${xVal}, ${yVal})</b></p>`;
    checkAfterMove();
  }

  plotDiv.addEventListener('mousedown', onDragStart);
  plotDiv.addEventListener('touchstart', onDragStart, { passive: false });

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('touchmove', onDragMove, { passive: false });

  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchend', onDragEnd);

  plotDiv.addEventListener('click', onClick);
  plotDiv.addEventListener('touchend', (evt) => {
    if (!dragging) onClick(evt);
  });
}

// Remove handlers to avoid duplicates when switching activities
function removePlotClickHandler() {
  const plotDiv = document.getElementById('plot-area');
  const newPlotDiv = plotDiv.cloneNode(true);
  plotDiv.parentNode.replaceChild(newPlotDiv, plotDiv);
}

// Draw for write mode (highlighted fixed point)
function drawPlot(marker, asStudent=true) {
  let data = [];
  if (mode === 'write' && marker) {
    data.push({
      x:[marker.x], y:[marker.y], type:'scatter', mode:'markers',
      name:'Given Point', marker:{ size:22, color:'#b7950b', symbol:'circle'}
    });
  }
  const layout = {
    xaxis: {
      range: [axesConfig.x.min, axesConfig.x.max],
      dtick: 1, zeroline:true, zerolinewidth:2,
      gridcolor:'rgba(128,128,128,0.15)', gridwidth:1, showline:true, linewidth:2,
      fixedrange: true
    },
    yaxis: {
      range: [axesConfig.y.min, axesConfig.y.max],
      dtick: 1, zeroline:true, zerolinewidth:2,
      gridcolor:'rgba(128,128,128,0.15)', gridwidth:1, showline:true, linewidth:2,
      scaleanchor: 'x',
      scaleratio: 1,
      fixedrange: true
    },
    showlegend:false,
    margin:{t:40, r:40, b:40, l:40},
    plot_bgcolor:'#f6fafd',
    hovermode:false
  };
  Plotly.newPlot('plot-area', data, layout, {displayModeBar:false, responsive:true});
}

// Check immediate correctness feedback for plot mode
function checkPlotImmediate() {
  if (!userMarker) {
    document.getElementById('feedback').innerHTML = '<span class="incorrect">Drag or click the marker to the coordinate.</span>';
    return;
  }
  if (userMarker.x === question.x && userMarker.y === question.y) {
    document.getElementById('feedback').innerHTML = `<span class="correct">🎉 Correct! (${question.x}, ${question.y}) is plotted.</span>`;
    Plotly.update('plot-area', {marker:{color:'#27ae60'}}, {}, [0]);
  } else {
    document.getElementById('feedback').innerHTML = `<span class="incorrect">❌ Try again. You selected (${userMarker.x}, ${userMarker.y}), but need (${question.x}, ${question.y}).</span>`;
    Plotly.update('plot-area', {marker:{color:'#e74c3c'}}, {}, [0]);
  }
}

// Check and show correctness for write mode
function checkAnswer() {
  document.getElementById('feedback').textContent = '';
  if (mode === 'write') {
    let userInput = document.getElementById('coords-input').value.trim();
    let matches = userInput.match(/-?\d+/g);
    let xAnswer = null, yAnswer = null;
    if (matches && matches.length >= 2) {
      xAnswer = parseInt(matches[0]);
      yAnswer = parseInt(matches[1]);
    }
    if (xAnswer === question.x && yAnswer === question.y) {
      document.getElementById('feedback').innerHTML = `<span class="correct">🎉 Correct! The coordinates are (${question.x}, ${question.y}).</span>`;
    } else {
      document.getElementById('feedback').innerHTML = `<span class="incorrect">❌ Incorrect. The correct answer is <b>(${question.x}, ${question.y})</b>.</span>`;
    }
    drawPlot(question, false);
  }
}

document.getElementById('plot-given').onchange = newQuestion;
document.getElementById('write-coords').onchange = newQuestion;

document.getElementById('next-btn').onclick = function() {
  if(mode === 'plot' && !userMarker) {
    document.getElementById('feedback').textContent = 'Drag or click the plane to move the marker.';
    return;
  }
  if(mode === 'write' && !document.getElementById('coords-input')) {
    return;
  }
  checkAnswer();
  setTimeout(newQuestion, 1700);
};

newQuestion();
</script>
</body>
</html>
